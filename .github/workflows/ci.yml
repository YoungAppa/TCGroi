name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Typecheck + lint + unit tests + pull-rate data validation, across all
      # workspaces (packages/ev carries the EV engine's coverage thresholds).
      - name: Verify
        run: npm run verify

      - name: Build
        # Proves the non-negotiable: the app builds with no price source
        # configured and no reachable database. getRankings degrades to an
        # empty payload; a build that needs live data would fail this.
        run: npm run build
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/packroi
          ADMIN_SECRET: ci-placeholder-secret
